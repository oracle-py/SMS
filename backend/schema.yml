openapi: 3.0.3
info:
  title: Student Monitoring System API
  version: 1.0.0
  description: A comprehensive academic monitoring system for tracking student performance,
    attendance, and academic progress.
paths:
  /api/v1/attendance/:
    get:
      operationId: attendance_list
      description: |-
        ViewSet for Attendance model.

        Provides CRUD operations for attendance records.
        - Admins: Full access
        - Students: Read-only access to their own attendance
        - Parents: Read-only access to linked students' attendance
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - absent
          - present
        description: |-
          * `present` - Present
          * `absent` - Absent
      tags:
      - attendance
      security:
      - jwtAuth: []
      - scheme: bearer
        bearerFormat: JWT
        type: http
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttendanceList'
          description: ''
    post:
      operationId: attendance_create
      description: |-
        ViewSet for Attendance model.

        Provides CRUD operations for attendance records.
        - Admins: Full access
        - Students: Read-only access to their own attendance
        - Parents: Read-only access to linked students' attendance
      tags:
      - attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
        required: true
      security:
      - jwtAuth: []
      - scheme: bearer
        bearerFormat: JWT
        type: http
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
