        Serializer for User model.

        Handles user creation and updates with password validation.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Unique username for the user
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          description: Email address of the user
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          description: |-
            Role of the user (student, parent, or admin)

            * `student` - Student
            * `parent` - Parent
            * `admin` - Admin
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
