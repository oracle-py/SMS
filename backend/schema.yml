components:
  schemas:
    AcademicSession:
      type: object
      description: |-
        Serializer for AcademicSession model.

        Handles academic session management with validation.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Session Name
          description: e.g., 2025/2026
          maxLength: 20
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_active:
          type: boolean
          title: Active Session
          description: Only one session can be active at a time
        is_active_display:
          type: string
          readOnly: true
      required:
      - end_date
      - id
      - is_active_display
      - name
      - start_date
    AcademicSessionRequest:
      type: object
      description: |-
        Serializer for AcademicSession model.

        Handles academic session management with validation.
      properties:
        name:
          type: string
          minLength: 1
          title: Session Name
          description: e.g., 2025/2026
          maxLength: 20
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_active:
          type: boolean
          title: Active Session
          description: Only one session can be active at a time
      required:
      - end_date
      - name
      - start_date
    Attendance:
      type: object
      description: |-
        Serializer for Attendance model.

        Handles attendance tracking with nested relationships.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEnum'
        status_display:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - date
      - id
      - status
      - status_display
      - student
    AttendanceDetail:
      type: object
      description: Detailed serializer for Attendance with full nested information.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          allOf:
          - $ref: '#/components/schemas/StudentProfileDetail'
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEnum'
        status_display:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - date
      - id
      - status
      - status_display
      - student
    AttendanceRecord:
      type: object
      description: Serializer for individual attendance record.
      properties:
        course:
          type: string
          readOnly: true
        course_title:
          type: string
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        status:
          type: string
          readOnly: true
        remarks:
          type: string
          readOnly: true
      required:
      - course
      - course_title
      - date
      - remarks
      - status
    AttendanceRequest:
      type: object
      description: |-
        Serializer for Attendance model.

        Handles attendance tracking with nested relationships.
      properties:
        student_id:
          type: integer
          writeOnly: true
        course_id:
          type: integer
          writeOnly: true
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - course_id
      - date
      - status
      - student_id
    Carryover:
      type: object
      description: Serializer for carryover course information.
      properties:
        course_code:
          type: string
          readOnly: true
        course_title:
          type: string
          readOnly: true
        score:
          type: number
          format: double
          readOnly: true
        letter_grade:
          type: string
          readOnly: true
        session:
          type: string
          readOnly: true
        semester:
          type: string
          readOnly: true
      required:
      - course_code
      - course_title
      - letter_grade
      - score
      - semester
      - session
    Course:
      type: object
      description: |-
        Serializer for Course model.

        Includes nested level and semester information.
      properties:
        id:
          type: integer
          readOnly: true
        course_code:
          type: string
          description: e.g., CSC101, MTH201
          maxLength: 20
        course_title:
          type: string
          maxLength: 200
        credit_unit:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Must be a positive integer
        level:
          allOf:
          - $ref: '#/components/schemas/Level'
          readOnly: true
        semester:
          allOf:
          - $ref: '#/components/schemas/Semester'
          readOnly: true
        is_active:
          type: boolean
          title: Active Course
      required:
      - course_code
      - course_title
      - credit_unit
      - id
      - level
      - semester
    CourseRegistration:
      type: object
      description: |-
        Serializer for CourseRegistration model.

        Handles course registration with nested relationships.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        session:
          allOf:
          - $ref: '#/components/schemas/AcademicSession'
          readOnly: true
        semester:
          allOf:
          - $ref: '#/components/schemas/Semester'
          readOnly: true
        registration_date:
          type: string
          format: date
          readOnly: true
        is_carryover:
          type: boolean
          title: Carryover
          description: Mark if this is a carryover course
        is_carryover_display:
          type: string
          readOnly: true
      required:
      - course
      - id
      - is_carryover_display
      - registration_date
      - semester
      - session
      - student
    CourseRegistrationDetail:
      type: object
      description: Detailed serializer for CourseRegistration with full nested information.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          allOf:
          - $ref: '#/components/schemas/StudentProfileDetail'
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        session:
          allOf:
          - $ref: '#/components/schemas/AcademicSession'
          readOnly: true
        semester:
          allOf:
          - $ref: '#/components/schemas/Semester'
          readOnly: true
        registration_date:
          type: string
          format: date
          readOnly: true
        is_carryover:
          type: boolean
          title: Carryover
